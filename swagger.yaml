openapi: 3.0.0
info:
  title: Microservicio de Áreas y Clientes
  description: API RESTful para gestión de zonas de trabajo y clientes con arquitectura limpia y optimizada
  version: 2.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://microservicebackendareasclientsv2-production.up.railway.app
    description: Production server
  - url: http://localhost:8080
    description: Development server

tags:
  - name: Áreas
    description: Operaciones CRUD para gestión de zonas de trabajo
  - name: Clientes
    description: Operaciones CRUD para gestión de clientes
  - name: Solicitudes de Creación
    description: Gestión de solicitudes de creación de clientes (Legacy - usar API v1)
  - name: Solicitudes para otro Microservicio
    description: Endpoints para consumo de otros microservicios (Legacy - usar API v1)
  - name: Microservicio Preventa
    description: Endpoints específicos para el microservicio de preventa (Legacy - usar API v1)
  - name: API v2 - Áreas (RESTful)
    description: |
      **NUEVA API v2 - Endpoints RESTful para Áreas**
      
      ## Características Principales
      - Arquitectura limpia con patrones SOLID
      - Inyección de dependencias
      - DTOs inmutables con propiedades readonly
      - Paginación eficiente (limit/offset y page-based)
      - Consultas SQL optimizadas (campos específicos)
      - Caching inteligente para datos de referencia
      - Manejo centralizado de errores
      - Tipado fuerte y consistente
      
      ## Formatos Soportados
      - **Paginación**: 
        - `GET /areas?limit=10&offset=0` (limit/offset)
        - `GET /areas?page=1&limit=10` (page-based)
      - **Respuesta paginada**:
        ```json
        {
          "data": [...],
          "pagination": {
            "total": 100,
            "limit": 10,
            "offset": 0,
            "page": 1,
            "totalPages": 10
          }
        }
        ```
      
      ## Mejores Prácticas
      - IDs numéricos consistentes con base de datos
      - Validación exhaustiva de datos de entrada
      - Manejo apropiado de códigos de estado HTTP
      - Documentación completa y actualizada
  - name: API v2 - Clientes (RESTful)
    description: |
      **NUEVA API v2 - Endpoints RESTful para Clientes**
      
      Cambios principales:
      - Recurso en plural `/clients`
      - Uso de métodos HTTP semánticos (GET, POST, PUT, DELETE)
      - Versionado `/api/v2`
      
      Reemplaza endpoints legacy: `/register-client`, `/get-clients`, `/get-client/{id}`, `/update-client/{id}`, `/delete-client/{id}`
  - name: API v2 - Solicitudes (RESTful)
    description: |
      **NUEVA API v2 - Endpoints RESTful para Solicitudes de Clientes**
      
      Cambios principales:
      - Recurso en plural `/client-requests`
      - Filtrado por query params `?status=pending`
      - Acción de aprobación como sub-recurso `/{id}/approve`
      - Versionado `/api/v2`
      
      Reemplaza endpoints legacy: `/request-create-cliente`, `/get-Pending-Request`, `/accept-Reject-Request/{id}`
  - name: API v2 - Internal (Microservices)
    description: |
      **NUEVA API v2 - Endpoints Internos para Microservicios**
      
      Cambios principales:
      - Namespace dedicado `/internal`
      - Sub-recursos RESTful `/areas/{id}/clients`
      - Versionado `/api/v2`
      
      Reemplaza endpoints legacy: `/get_dataArea/{id}`, `/get_clientArea/{id}`, `/client/{id}`

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Area:
      type: object
      properties:
        nombre_zona_trabajo:
          type: string
          minLength: 1
          maxLength: 45
          description: Nombre del área de trabajo (requerido, 1-45 caracteres)
          example: "Zona Norte"
        descripcion:
          type: string
          maxLength: 255
          description: Descripción del área de trabajo (opcional, máximo 255 caracteres)
          example: "Zona asignada para ventas en el sector norte"
      required:
        - nombre_zona_trabajo
          
    Client:
      type: object
      properties:
        cedula:
          type: string
          minLength: 6
          maxLength: 15
          pattern: '^[0-9]+$'
          description: Número de cédula del cliente (requerido, solo números, 6-15 caracteres)
          example: "1234567890"
        email:
          type: string
          format: email
          maxLength: 100
          description: Correo electrónico del cliente (requerido, formato email válido, máximo 100 caracteres)
          example: "cliente@ejemplo.com"
        nombre_completo_cliente:
          type: string
          minLength: 6
          maxLength: 200
          description: Nombre completo del cliente (requerido, 6-200 caracteres)
          example: "Juan Pérez González"
        direccion:
          type: string
          minLength: 5
          maxLength: 255
          description: Dirección del cliente (requerido, 5-255 caracteres)
          example: "Calle Principal #123, Ciudad"
        telefono:
          type: string
          minLength: 8
          maxLength: 15
          pattern: '^[0-9]+$'
          description: Número de teléfono del cliente (requerido, solo números, 8-15 caracteres)
          example: "3001234567"
        rut_nit:
          type: string
          maxLength: 30
          description: RUT/NIT del cliente (opcional, máximo 30 caracteres)
          example: "900123456-7"
        razon_social:
          type: string
          maxLength: 100
          description: Razón social del cliente (opcional, máximo 100 caracteres)
          example: "Empresa XYZ S.A.S."
        estado:
          type: string
          enum: ["Activo", "Inactivo"]
          description: Estado del cliente (requerido)
          example: "Activo"
        id_zona_de_trabajo:
          type: string
          description: ID del área de trabajo asignada (opcional, string según implementación actual)
          example: "5"
      required:
        - cedula
        - email
        - nombre_completo_cliente
        - direccion
        - telefono
        - estado
    
    RequestCreateClient:
      type: object
      properties:
        cedula:
          type: string
          minLength: 6
          maxLength: 15
          pattern: '^[0-9]+$'
          description: Número de cédula del cliente (requerido, solo números, 6-15 caracteres)
          example: "1234567890"
        nombre_completo_cliente:
          type: string
          minLength: 6
          maxLength: 200
          description: Nombre completo del cliente (requerido, 6-200 caracteres)
          example: "Juan Pérez González"
        direccion:
          type: string
          minLength: 5
          maxLength: 255
          description: Dirección del cliente (requerido, 5-255 caracteres)
          example: "Calle Principal #123, Ciudad"
        telefono:
          type: string
          minLength: 8
          maxLength: 15
          pattern: '^[0-9]+$'
          description: Número de teléfono del cliente (requerido, solo números, 8-15 caracteres)
          example: "3001234567"
        rut_nit:
          type: string
          maxLength: 30
          description: RUT/NIT del cliente (opcional, máximo 30 caracteres)
          example: "900123456-7"
        razon_social:
          type: string
          maxLength: 100
          description: Razón social del cliente (opcional, máximo 100 caracteres)
          example: "Empresa XYZ S.A.S."
        id_zona_de_trabajo:
          type: string
          description: ID del área de trabajo asignada (opcional)
          example: "5"
      required:
        - cedula
        - nombre_completo_cliente
        - direccion
        - telefono

    PaginationParams:
      type: object
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Número de elementos por página (default: 10)
          example: 10
        offset:
          type: integer
          minimum: 0
          default: 0
          description: Número de elementos a saltar (default: 0)
          example: 20
        page:
          type: integer
          minimum: 1
          default: 1
          description: Número de página (calcula offset automáticamente)
          example: 3

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/Area'
              - $ref: '#/components/schemas/Client'
          description: Lista de elementos paginados
        pagination:
          type: object
          properties:
            total:
              type: integer
              description: Total de elementos disponibles
              example: 100
            limit:
              type: integer
              description: Límite de elementos por página
              example: 10
            offset:
              type: integer
              description: Elementos saltados
              example: 20
            page:
              type: integer
              description: Página actual
              example: 3
            totalPages:
              type: integer
              description: Total de páginas
              example: 10

    Error:
      type: object
      properties:
        error:
          type: string
          description: Mensaje de error
        details:
          type: string
          description: Detalles adicionales del error
        errors:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              msg:
                type: string
              path:
                type: string
              location:
                type: string
          description: Array de errores de validación (para status 422)

paths:

  
  # ============================================================
  # API v2 - Endpoints RESTful (Implementación Real)
  # ============================================================
  # Rutas que existen realmente en el código:
  # - /routes/v2/area.routes.ts
  # - /routes/v2/client.routes.ts  
  # - /routes/v2/client-request.routes.ts
  # ============================================================

  /api/v2/areas:
    get:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Áreas (RESTful)
      summary: Listar todas las áreas
      description: Obtiene la lista de todas las áreas de trabajo con soporte de paginación
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Número de elementos por página
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Número de elementos a saltar
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Número de página (calcula offset automáticamente)
      responses:
        '200':
          description: Lista de áreas obtenida exitosamente
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/Area'
                  - $ref: '#/components/schemas/PaginatedResponse'
        '500':
          description: Error interno del servidor

    post:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Áreas (RESTful)
      summary: Crear nueva área
      description: Crea una nueva área de trabajo en el sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Area'
      responses:
        '201':
          description: Área creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Zona registrada con éxito"
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/areas/{id_zona_de_trabajo}:
    get:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Áreas (RESTful)
      summary: Obtener área por ID
      description: Obtiene una área específica por su ID con caching
      parameters:
        - name: id_zona_de_trabajo
          in: path
          required: true
          description: ID del área a buscar
          schema:
            type: integer
      responses:
        '200':
          description: Área encontrada exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Area'
        '404':
          description: Área no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Áreas (RESTful)
      summary: Actualizar área
      description: Actualiza una área existente por su ID
      parameters:
        - name: id_zona_de_trabajo
          in: path
          required: true
          description: ID del área a actualizar
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Area'
      responses:
        '200':
          description: Área actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Área actualizada con éxito"
        '404':
          description: Área no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Áreas (RESTful)
      summary: Eliminar área
      description: Elimina un área existente por su ID
      parameters:
        - name: id_zona_de_trabajo
          in: path
          required: true
          description: ID del área a eliminar
          schema:
            type: integer
      responses:
        '200':
          description: Área eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Área eliminada con éxito"
        '404':
          description: Área no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: No se puede eliminar el área debido a referencias existentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/clients:
    get:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Clientes (RESTful)
      summary: Listar todos los clientes
      description: Obtiene la lista de todos los clientes del sistema
      responses:
        '200':
          description: Lista de clientes obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Clientes (RESTful)
      summary: Crear nuevo cliente
      description: Crea un nuevo cliente directamente en el sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
      responses:
        '201':
          description: Cliente creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Cliente registrado con éxito"
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/clients/{id_cliente}:
    get:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Clientes (RESTful)
      summary: Obtener cliente por ID
      description: Obtiene un cliente específico por su ID
      parameters:
        - name: id_cliente
          in: path
          required: true
          description: ID del cliente a buscar
          schema:
            type: integer
      responses:
        '200':
          description: Cliente encontrado exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        '404':
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Clientes (RESTful)
      summary: Actualizar cliente
      description: Actualiza un cliente existente por su ID
      parameters:
        - name: id_cliente
          in: path
          required: true
          description: ID del cliente a actualizar
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
      responses:
        '200':
          description: Cliente actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Cliente actualizado con éxito"
        '404':
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Clientes (RESTful)
      summary: Eliminar cliente
      description: Elimina un cliente existente por su ID
      parameters:
        - name: id_cliente
          in: path
          required: true
          description: ID del cliente a eliminar
          schema:
            type: integer
      responses:
        '200':
          description: Cliente eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Cliente eliminado con éxito"
        '404':
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: No se puede eliminar el cliente debido a referencias existentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/client-requests:
    get:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Solicitudes (RESTful)
      summary: Listar solicitudes de clientes
      description: Obtiene la lista de solicitudes de creación de clientes pendientes
      responses:
        '200':
          description: Lista de solicitudes obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id_cliente:
                      type: integer
                      description: ID del cliente
                    cedula:
                      type: string
                      description: Cédula del cliente
                    nombre_completo_cliente:
                      type: string
                      description: Nombre completo del cliente
                    direccion:
                      type: string
                      description: Dirección del cliente
                    telefono:
                      type: string
                      description: Teléfono del cliente
                    rut_nit:
                      type: string
                      description: RUT/NIT del cliente
                    razon_social:
                      type: string
                      description: Razón social del cliente
                    estado:
                      type: string
                      description: Estado de la solicitud
                    id_zona_de_trabajo:
                      type: string
                      description: ID de zona de trabajo
        '404':
          description: No hay solicitudes pendientes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Solicitudes (RESTful)
      summary: Crear solicitud de cliente
      description: Crea una solicitud de creación de cliente pendiente de aprobación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestCreateClient'
      responses:
        '201':
          description: Solicitud creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Cliente registrado con éxito"
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/client-requests/{id_client}/approve:
    patch:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Solicitudes (RESTful)
      summary: Aprobar solicitud de cliente
      description: Aprueba una solicitud de creación de cliente (reemplaza /accept-Reject-Request/{id})
      parameters:
        - name: id_client
          in: path
          required: true
          description: ID del cliente de la solicitud a aprobar
          schema:
            type: integer
      responses:
        '200':
          description: Solicitud aprobada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Solicitud aprobada con éxito"
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'