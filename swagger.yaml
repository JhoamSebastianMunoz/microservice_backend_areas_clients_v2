openapi: 3.0.0
info:
  title: Microservicio de Áreas y Clientes
  description: API RESTful para gestión de zonas de trabajo y clientes con arquitectura limpia y optimizada
  version: 2.0.0
  contact:
    name: API Support
    email: support@microservice.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v2
    description: Servidor de desarrollo
  - url: https://backendareasandclients-apgba5dxbrbwb2ex.eastus2-01.azurewebsites.net/api/v2
    description: Servidor de producción

tags:
  - name: Áreas
    description: Operaciones CRUD para gestión de zonas de trabajo
  - name: Clientes
    description: Operaciones CRUD para gestión de clientes
  - name: Solicitudes de Creación
    description: Gestión de solicitudes de creación de clientes (Legacy - usar API v1)
  - name: Solicitudes para otro Microservicio
    description: Endpoints para consumo de otros microservicios (Legacy - usar API v1)
  - name: Microservicio Previene
    description: Endpoints específicos para el microservicio de prevención (Legacy - usar API v1)
  - name: API v2 - Áreas (RESTful)
    description: |
      **NUEVA API v2 - Endpoints RESTful para Áreas**
      
      ## Características Principales
      - Arquitectura limpia con patrones SOLID
      - Inyección de dependencias
      - DTOs inmutables con propiedades readonly
      - Paginación eficiente (limit/offset y page-based)
      - Consultas SQL optimizadas (campos específicos)
      - Caching inteligente para datos de referencia
      - Manejo centralizado de errores
      - Tipado fuerte y consistente
      
      ## Formatos Soportados
      - **Paginación**: 
        - `GET /areas?limit=10&offset=0` (limit/offset)
        - `GET /areas?page=1&limit=10` (page-based)
      - **Respuesta paginada**:
        ```json
        {
          "data": [...],
          "pagination": {
            "total": 100,
            "limit": 10,
            "offset": 0,
            "page": 1,
            "totalPages": 10
          }
        }
        ```
      
      ## Mejores Prácticas
      - IDs numéricos consistentes con base de datos
      - Validación exhaustiva de datos de entrada
      - Manejo apropiado de códigos de estado HTTP
      - Documentación completa y actualizada
  - name: API v2 - Clientes (RESTful)
    description: |
      **NUEVA API v2 - Endpoints RESTful para Clientes**
      
      Cambios principales:
      - Recurso en plural `/clients`
      - Uso de métodos HTTP semánticos (GET, POST, PUT, DELETE)
      - Versionado `/api/v2`
      
      Reemplaza endpoints legacy: `/register-client`, `/get-clients`, `/get-client/{id}`, `/update-client/{id}`, `/delete-client/{id}`
  - name: API v2 - Solicitudes (RESTful)
    description: |
      **NUEVA API v2 - Endpoints RESTful para Solicitudes de Clientes**
      
      Cambios principales:
      - Recurso en plural `/client-requests`
      - Filtrado por query params `?status=pending`
      - Acción de aprobación como sub-recurso `/{id}/approve`
      - Versionado `/api/v2`
      
      Reemplaza endpoints legacy: `/request-create-cliente`, `/get-Pending-Request`, `/accept-Reject-Request/{id}`
  - name: API v2 - Internal (Microservices)
    description: |
      **NUEVA API v2 - Endpoints Internos para Microservicios**
      
      Cambios principales:
      - Namespace dedicado `/internal`
      - Sub-recursos RESTful `/areas/{id}/clients`
      - Versionado `/api/v2`
      
      Reemplaza endpoints legacy: `/get_dataArea/{id}`, `/get_clientArea/{id}`, `/client/{id}`

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Area:
      type: object
      properties:
        nombre_zona_trabajo:
          type: string
          minLength: 1
          maxLength: 45
          description: Nombre del área de trabajo
        descripcion:
          type: string
          maxLength: 255
          description: Descripción del área de trabajo
          
    Client:
      type: object
      properties:
        cedula:
          type: string
          minLength: 6
          maxLength: 15
          description: Número de cédula del cliente
        nombre_completo_cliente:
          type: string
          minLength: 6
          maxLength: 200
          description: Nombre completo del cliente
        direccion:
          type: string
          minLength: 5
          maxLength: 255
          description: Dirección del cliente
        telefono:
          type: string
          minLength: 8
          maxLength: 15
          description: Número de teléfono del cliente
        rut_nit:
          type: string
          maxLength: 30
          description: RUT/NIT del cliente
        razon_social:
          type: string
          maxLength: 100
          description: Razón social del cliente
        estado:
          type: string
          enum: [Activo, Inactivo]
          description: Estado del cliente
        id_zona_de_trabajo:
          type: integer
          description: ID del área de trabajo asignada
    
    Error:
      type: object
      properties:
        error:
          type: string
          description: Mensaje de error
        details:
          type: string
          description: Detalles adicionales del error

paths:
  /register-area:
    post:
      security:
        - bearerAuth: []
      tags:
        - Áreas
      summary: Registrar nueva área de trabajo
      description: Crear una nueva área de trabajo en el sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Area'
      responses:
        '201':
          description: Área registrada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Zona registrada con éxito"
        '422':
          description: Error de validación
        '500':
          description: Error interno del servidor
          
  /get-areas:
    get:
      security:
        - bearerAuth: []
      tags:
        - Áreas
      summary: Obtener todas las áreas
      description: Retorna la lista de todas las áreas de trabajo
      responses:
        '200':
          description: Lista de áreas obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Area'
        '500':
          description: Error interno del servidor

  /get-area/{id_zona_de_trabajo}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Áreas
      summary: Obtener un área específica
      description: Retorna un área de trabajo por su ID
      parameters:
        - name: id_zona_de_trabajo
          in: path
          required: true
          description: ID del área a buscar
          schema:
            type: integer
      responses:
        '200':
          description: Área encontrada exitosamente
        '404':
          description: Área no encontrada
        '500':
          description: Error interno del servidor
          
  /delete-area/{id_zona_de_trabajo}:
    delete:
      security:
        - bearerAuth: []
      tags:
        - Áreas
      summary: Eliminar un área
      description: Elimina un área de trabajo por su ID
      parameters:
        - name: id_zona_de_trabajo
          in: path
          required: true
          description: ID del área a eliminar
          schema:
            type: integer
      responses:
        '200':
          description: Área eliminada exitosamente
        '404':
          description: Área no encontrada
        '409':
          description: No se puede eliminar el área debido a referencias existentes
        '500':
          description: Error interno del servidor

  /update-area/{id_zona_de_trabajo}:
    put:
      security:
        - bearerAuth: []
      tags:
        - Áreas
      summary: Actualizar un área
      description: Actualiza la información de un área existente
      parameters:
        - name: id_zona_de_trabajo
          in: path
          required: true
          description: ID del área a actualizar
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Area'
      responses:
        '200':
          description: Área actualizada exitosamente
        '404':
          description: Área no encontrada
        '500':
          description: Error interno del servidor

  /register-client:
    post:
      security:
        - bearerAuth: []
      tags:
        - Clientes
      summary: Registrar nuevo cliente
      description: Crear un nuevo cliente en el sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
      responses:
        '201':
          description: Cliente registrado exitosamente
        '422':
          description: Error de validación
        '500':
          description: Error interno del servidor

  /get-clients:
    get:
      security:
        - bearerAuth: []
      tags:
        - Clientes
      summary: Obtener todos los clientes
      description: Retorna la lista de todos los clientes
      responses:
        '200':
          description: Lista de clientes obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        '500':
          description: Error interno del servidor

  /get-client/{id_cliente}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Clientes
      summary: Obtener un cliente específico
      description: Retorna un cliente por su ID
      parameters:
        - name: id_cliente
          in: path
          required: true
          description: ID del cliente a buscar
          schema:
            type: integer
      responses:
        '200':
          description: Cliente encontrado exitosamente
        '404':
          description: Cliente no encontrado
        '500':
          description: Error interno del servidor

  /delete-client/{id_cliente}:
    delete:
      security:
        - bearerAuth: []
      tags:
        - Clientes
      summary: Eliminar un cliente
      description: Elimina un cliente por su ID
      parameters:
        - name: id_cliente
          in: path
          required: true
          description: ID del cliente a eliminar
          schema:
            type: integer
      responses:
        '200':
          description: Cliente eliminado exitosamente
        '404':
          description: Cliente no encontrado
        '409':
          description: No se puede eliminar el cliente debido a referencias existentes
        '500':
          description: Error interno del servidor

  /update-client/{id_cliente}:
    put:
      security:
        - bearerAuth: []
      tags:
        - Clientes
      summary: Actualizar un cliente
      description: Actualiza la información de un cliente existente
      parameters:
        - name: id_cliente
          in: path
          required: true
          description: ID del cliente a actualizar
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
      responses:
        '200':
          description: Cliente actualizado exitosamente
        '404':
          description: Cliente no encontrado
        '500':
          description: Error interno del servidor

  /request-create-cliente:
    post:
      tags:
        - Solicitudes de Creación
      summary: Solicitud de creación de un nuevo cliente
      description: Permite a un colaborador enviar una solicitud para crear un nuevo cliente. La solicitud quedará pendiente de aprobación.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cedula
                - nombre_completo_cliente
                - direccion
                - telefono
              properties:
                cedula:
                  type: string
                  minLength: 6
                  maxLength: 15
                  description: Número de identificación del cliente (cédula). Debe contener solo números.
                  example: "1234567890"
                nombre_completo_cliente:
                  type: string
                  minLength: 6
                  maxLength: 200
                  description: Nombre completo del cliente.
                  example: "Juan Pérez González"
                direccion:
                  type: string
                  minLength: 5
                  maxLength: 255
                  description: Dirección física del cliente.
                  example: "Calle Principal #123, Ciudad"
                telefono:
                  type: string
                  minLength: 8
                  maxLength: 15
                  description: Número de teléfono del cliente, solo dígitos.
                  example: "3001234567"
                rut_nit:
                  type: string
                  maxLength: 30
                  description: Número de identificación tributaria del cliente (opcional).
                  example: "900123456-7"
                razon_social:
                  type: string
                  maxLength: 100
                  description: Razón social para clientes empresariales (opcional).
                  example: "Empresa XYZ S.A.S."
                id_zona_de_trabajo:
                  type: integer
                  format: int32
                  minimum: 1
                  description: ID de la zona de trabajo a la que pertenece el cliente (opcional).
                  example: 5
      responses:
        '201':
          description: Cliente registrado con éxito (pendiente de aprobación)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Cliente registrado con éxito"
        '401':
          description: No autorizado - Token no proporcionado o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "token inválido o expirado"
        '403':
          description: Prohibido - El usuario no tiene permisos para realizar esta acción
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "No tienes permisos para realizar esta acción"
        '422':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        msg:
                          type: string
                        path:
                          type: string
                        location:
                          type: string
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      errorInfo:
                        type: string
                        example: "Duplicate entry '1234567890' for key 'cedula'"
                  - type: object
                    properties:
                      error:
                        type: string
                        example: "Internal Server Error"
                      details:
                        type: string

  /get-Pending-Request:
    get:
      tags:
        - Solicitudes de Creación
      summary: Obtener solicitudes de creación de clientes pendientes
      description: Permite a un administrador y a un colaborador obtener todas las solicitudes de creación de clientes que están en estado pendiente.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de solicitudes pendientes obtenida con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id_cliente:
                      type: integer
                      description: Identificador único del cliente
                      example: 1
                    cedula:
                      type: string
                      description: Número de identificación del cliente
                      example: "1234567890"
                    nombre_completo_cliente:
                      type: string
                      description: Nombre completo del cliente
                      example: "Juan Pérez González"
                    direccion:
                      type: string
                      description: Dirección física del cliente
                      example: "Calle Principal #123, Ciudad"
                    telefono:
                      type: string
                      description: Número de teléfono del cliente
                      example: "3001234567"
                    rut_nit:
                      type: string
                      description: Número de identificación tributaria del cliente
                      example: "900123456-7"
                    razon_social:
                      type: string
                      description: Razón social para clientes empresariales
                      example: "Empresa XYZ S.A.S."
                    estado:
                      type: string
                      description: Estado de la solicitud (siempre "Pendiente" en esta ruta)
                      example: "Pendiente"
                    id_zona_de_trabajo:
                      type: string
                      description: ID de la zona de trabajo a la que pertenece el cliente
                      example: "5"
        '401':
          description: No autorizado - Token no proporcionado o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "token inválido o expirado"
        '403':
          description: Prohibido - El usuario no tiene permisos para realizar esta acción
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "No tienes permisos para realizar esta acción"
        '404':
          description: No hay solicitudes pendientes
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "No hay solicitudes pendientes"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Internal Server Error"
                  details:
                    type: string
                    example: "Error message details"

  /accept-Reject-Request/{id_client}:
    put:
      security:
        - bearerAuth: []
      tags:
        - Solicitudes de Creación
      summary: Aceptar o rechazar solicitud
      description: Procesar una solicitud de creación de cliente
      parameters:
        - name: id_client
          in: path
          required: true
          description: ID del cliente de la solicitud
          schema:
            type: integer
      responses:
        '200':
          description: Solicitud procesada exitosamente
        '404':
          description: Solicitud no encontrada
        '500':
          description: Error interno del servidor

  /get_dataArea/{id_area}:
    get:
      tags:
        - Solicitudes para otro Microservicio
      summary: Obtener información de una zona de trabajo por ID
      description: Retorna los detalles de una zona de trabajo específica basada en el ID proporcionado.
      parameters:
        - name: id_area
          in: path
          required: true
          description: ID de la zona de trabajo a consultar
          schema:
            type: integer
      responses:
        200:
          description: Zona de trabajo encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id_zona_de_trabajo:
                    type: integer
                    example: 1
                  nombre:
                    type: string
                    example: "Zona Norte"
                  descripcion:
                    type: string
                    example: "Zona asignada para ventas en el sector norte"
        404:
          description: Zona de trabajo no encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Zona no encontrada"
        500:
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Error interno del servidor"
  
  /get_clientArea/{id_area}:
    get:
      tags:
        - Solicitudes para otro Microservicio
      summary: Obtener clientes por zona de trabajo
      description: Retorna una lista de clientes asociados a una zona de trabajo específica.
      parameters:
        - name: id_area
          in: path
          required: true
          description: ID de la zona de trabajo para la cual se desea obtener la lista de clientes.
          schema:
            type: integer
      responses:
        "200":
          description: Lista de clientes en la zona de trabajo especificada.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id_cliente:
                      type: integer
                      description: ID del cliente.
                    nombre:
                      type: string
                      description: Nombre del cliente.
                    email:
                      type: string
                      format: email
                      description: Correo electrónico del cliente.
                    telefono:
                      type: string
                      description: Número de teléfono del cliente.
        "404":
          description: No hay clientes en la zona especificada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No hay clientes en esta zona
        "500":
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error interno del servidor

  /client/{id_client}:
    get:
      tags:
        - Microservicio Preventa
      summary: Obtener datos de un cliente para el microservicio de preventa
      description: Consulta la información de un cliente específico y su zona de trabajo para ser utilizada por el microservicio de preventa.
      parameters:
        - name: id_client
          in: path
          required: true
          description: Identificador único del cliente a consultar
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Datos del cliente obtenidos con éxito
          content:
            application/json:
              schema:
                type: object
                properties:
                  razon_social:
                    type: string
                    description: Razón social del cliente (para empresas)
                    example: "Empresa XYZ S.A.S."
                  nombre_completo_cliente:
                    type: string
                    description: Nombre completo del cliente
                    example: "Juan Pérez González"
                  direccion:
                    type: string
                    description: Dirección física del cliente
                    example: "Calle Principal #123, Ciudad"
                  telefono:
                    type: string
                    description: Número de teléfono del cliente
                    example: "3001234567"
                  zona:
                    type: string
                    description: Nombre de la zona de trabajo asignada al cliente
                    example: "Zona Norte"
        '404':
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Cliente con ID 123 no encontrado"
        '422':
          description: Error de validación en los parámetros
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        msg:
                          type: string
                          example: "El id del cliente es obligatorio"
                        path:
                          type: string
                          example: "id_client"
                        location:
                          type: string
                          example: "params"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Internal Server Error"
                  details:
                    type: string
                    description: Detalles del error

  # ============================================================
  # NUEVAS RUTAS API v1 (RESTful - Consolidadas)
  # ============================================================
  # Estas rutas siguen los estándares RESTful con:
  # - Versionado: /api/v2
  # - Recursos en plural: /areas, /clients
  # - Métodos HTTP semánticos
  # ============================================================

  /api/v2/areas:
    get:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Áreas (RESTful)
      summary: Listar todas las áreas
      description: Obtiene la lista de todas las áreas de trabajo (reemplaza /get-areas)
      responses:
        '200':
          description: Lista de áreas obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Area'
        '500':
          description: Error interno del servidor

    post:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Áreas (RESTful)
      summary: Crear nueva área
      description: Crea una nueva área de trabajo (reemplaza /register-area)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Area'
      responses:
        '201':
          description: Área creada exitosamente
        '422':
          description: Error de validación
        '500':
          description: Error interno del servidor

  /api/v2/areas/{id}:
    get:
      security:
        - bearerAuth: []
      tags:
        - API v2 - Áreas (RESTful)
      summary: Obtener área por ID
      description: Obtiene una área específica por su ID (reemplaza /get-area/{id})
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Área encontrada
        '404':
          description: Área no encontrada
        '500':
          description: Error interno del servidor

    put:
      security:
        - bearerAuth: []
      tags:
